<svg width="1280" height="280" viewBox="0 0 1280 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="NovaPay GRC Risk Assessment Portfolio">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="55%" stop-color="#1A2332"/>
      <stop offset="100%" stop-color="#0F2A2E"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2DD4BF"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <style>
      text { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }
    </style>
  </defs>

  <!-- fondo -->
  <rect width="1280" height="280" fill="url(#bg)"/>

  <!-- grilla sutil tipo matriz de riesgo a la derecha -->
  <g opacity="0.16">
    <g transform="translate(940,40)">
      <!-- 5x5 mini heatmap -->
      <!-- fila 5 (P alta) -->
      <rect x="0"   y="0"  width="56" height="40" rx="4" fill="#FCD34D"/>
      <rect x="60"  y="0"  width="56" height="40" rx="4" fill="#F87171"/>
      <rect x="120" y="0"  width="56" height="40" rx="4" fill="#F87171"/>
      <rect x="180" y="0"  width="56" height="40" rx="4" fill="#F87171"/>
      <rect x="240" y="0"  width="56" height="40" rx="4" fill="#F87171"/>
      <!-- fila 4 -->
      <rect x="0"   y="44" width="56" height="40" rx="4" fill="#4ADE80"/>
      <rect x="60"  y="44" width="56" height="40" rx="4" fill="#FCD34D"/>
      <rect x="120" y="44" width="56" height="40" rx="4" fill="#FCD34D"/>
      <rect x="180" y="44" width="56" height="40" rx="4" fill="#F87171"/>
      <rect x="240" y="44" width="56" height="40" rx="4" fill="#F87171"/>
      <!-- fila 3 -->
      <rect x="0"   y="88" width="56" height="40" rx="4" fill="#4ADE80"/>
      <rect x="60"  y="88" width="56" height="40" rx="4" fill="#FCD34D"/>
      <rect x="120" y="88" width="56" height="40" rx="4" fill="#FCD34D"/>
      <rect x="180" y="88" width="56" height="40" rx="4" fill="#FCD34D"/>
      <rect x="240" y="88" width="56" height="40" rx="4" fill="#F87171"/>
      <!-- fila 2 -->
      <rect x="0"   y="132" width="56" height="40" rx="4" fill="#4ADE80"/>
      <rect x="60"  y="132" width="56" height="40" rx="4" fill="#4ADE80"/>
      <rect x="120" y="132" width="56" height="40" rx="4" fill="#FCD34D"/>
      <rect x="180" y="132" width="56" height="40" rx="4" fill="#FCD34D"/>
      <rect x="240" y="132" width="56" height="40" rx="4" fill="#FCD34D"/>
      <!-- fila 1 (P baja) -->
      <rect x="0"   y="176" width="56" height="40" rx="4" fill="#4ADE80"/>
      <rect x="60"  y="176" width="56" height="40" rx="4" fill="#4ADE80"/>
      <rect x="120" y="176" width="56" height="40" rx="4" fill="#4ADE80"/>
      <rect x="180" y="176" width="56" height="40" rx="4" fill="#4ADE80"/>
      <rect x="240" y="176" width="56" height="40" rx="4" fill="#FCD34D"/>
    </g>
  </g>

  <!-- barra de acento -->
  <rect x="80" y="78" width="6" height="124" rx="3" fill="url(#teal)"/>

  <!-- título -->
  <text x="110" y="116" fill="#FFFFFF" font-size="42" font-weight="700">NovaPay — GRC Risk Assessment</text>
  <text x="110" y="156" fill="#94A3B8" font-size="22" font-weight="400">Evaluación de riesgos y registro de riesgos para una fintech ficticia</text>

  <!-- chips de frameworks -->
  <g font-size="15" font-weight="600">
    <rect x="110" y="184" width="92"  height="30" rx="15" fill="#134E4A"/>
    <text x="156" y="204" fill="#5EEAD4" text-anchor="middle">PCI DSS</text>
    <rect x="212" y="184" width="78"  height="30" rx="15" fill="#134E4A"/>
    <text x="251" y="204" fill="#5EEAD4" text-anchor="middle">DORA</text>
    <rect x="300" y="184" width="120" height="30" rx="15" fill="#134E4A"/>
    <text x="360" y="204" fill="#5EEAD4" text-anchor="middle">ISO 27001</text>
    <rect x="430" y="184" width="78"  height="30" rx="15" fill="#134E4A"/>
    <text x="469" y="204" fill="#5EEAD4" text-anchor="middle">GDPR</text>
    <rect x="518" y="184" width="100" height="30" rx="15" fill="#134E4A"/>
    <text x="568" y="204" fill="#5EEAD4" text-anchor="middle">NIST CSF</text>
    <rect x="628" y="184" width="108" height="30" rx="15" fill="#134E4A"/>
    <text x="682" y="204" fill="#5EEAD4" text-anchor="middle">CIS Controls</text>
  </g>
</svg>
